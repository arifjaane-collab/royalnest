<!DOCTYPE html>
<html>
<head>
<title>ARIF Furniture</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
font-family: Arial, sans-serif;
margin: 0;
background: #f5f5f5;
}

header {
background: #222;
color: white;
text-align: center;
padding: 20px;
font-size: 24px;
}

.products {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 20px;
padding: 20px;
}

.card {
background: white;
padding: 15px;
border-radius: 10px;
box-shadow: 0 4px 8px rgba(0,0,0,0.1);
text-align: center;
}

.card img {
width: 100%;
height: 250px;
object-fit: cover;
border-radius: 10px;
}

.card h3 {
margin: 10px 0 5px;
}

.card p {
font-size: 18px;
font-weight: bold;
color: #444;
}

.whatsapp-btn {
display: inline-block;
margin-top: 10px;
padding: 8px 15px;
background: green;
color: white;
text-decoration: none;
border-radius: 5px;
}
</style>
</head>

<body>

<header>ARIF Premium Sofa Collection</header>

<div class="products">

<!-- 20 Sofa Cards -->

<script>
const sofas = [
["Classic 1 Seater Sofa","8999"],
["Premium 2 Seater Sofa","14499"],
["Luxury 3 Seater Sofa","19999"],
["Royal 4 Seater Sofa","26999"],
["Modern L-Shape Sofa","32999"],
["Wooden Frame Sofa","17499"],
["Fabric Designer Sofa","21999"],
["Velvet Luxury Sofa","24499"],
["Compact Apartment Sofa","13999"],
["Recliner Sofa Set","34999"],
["Leather 3+1+1 Sofa Set","39999"],
["Minimalist Grey Sofa","18499"],
["Sectional Corner Sofa","29999"],
["Chesterfield Sofa","44999"],
["Luxury U-Shape Sofa","52999"],
["Compact 2+2 Sofa Set","22499"],
["Premium Wooden Sofa Set","27999"],
["Designer Blue Sofa","23999"],
["Luxury Brown Sofa Set","31499"],
["Elite Premium Sofa Set","48999"]
];

sofas.forEach(sofa => {
document.write(`
<div class="card">
<img src="https://source.unsplash.com/400x400/?sofa,${sofa[0]}" alt="${sofa[0]}">
<h3>${sofa[0]}</h3>
<p>₹${sofa[1]}</p>
<a class="whatsapp-btn" href="https://wa.me/918888239637?text=I want ${sofa[0]}" target="_blank">Order Now</a>
</div>
`);
});
</script>

</div>

</body>
</html>
